name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Smoke-test the dashboard
        run: python3 test_dashboard.py
      - name: Build static site
        run: |
          mkdir -p site
          # No --serve => the server prints the rendered dashboard HTML to stdout.
          python3 palo_alto_server.py > site/index.html
          cp -r maps site/maps
          touch site/.nojekyll
          echo "Built $(wc -c < site/index.html) bytes; $(ls site/maps | wc -l) images."
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
